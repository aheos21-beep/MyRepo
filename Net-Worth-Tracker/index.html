<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthTrack – Net Worth Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-8 min-h-screen">
<div class="max-w-6xl mx-auto">

  <!-- HEADER -->
  <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
      <div class="flex items-center gap-2">
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">WealthTrack</h1>
        <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full text-xs font-bold uppercase tracking-wider">Saved Locally</span>
      </div>
      <p id="hdr-date" class="text-slate-500 text-sm"></p>
    </div>
    <div class="flex items-center gap-3 no-print">
      <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <div class="flex bg-white rounded-xl p-1 shadow-sm border border-slate-200">
        <button id="btn-assets" onclick="switchTab('assets')" class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white shadow-md">Ledger</button>
        <button id="btn-dashboard" onclick="switchTab('dashboard')" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100">Analysis</button>
      </div>
    </div>
  </header>

  <!-- LEDGER TAB -->
  <div id="tab-assets">
    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm flex flex-col md:flex-row justify-between items-center gap-8 mb-6 relative overflow-hidden">
      <div style="position:absolute;top:0;right:0;width:16rem;height:16rem;background:#eff6ff;border-radius:50%;margin-right:-6rem;margin-top:-6rem;filter:blur(40px);opacity:0.5;pointer-events:none"></div>
      <div class="flex items-center gap-6" style="position:relative;z-index:1">
        <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
          <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1 0-4h14v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
        </div>
        <div>
          <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Total Net Worth</h3>
          <p id="net-worth" class="text-4xl font-black tracking-tight text-slate-900">—</p>
        </div>
      </div>
      <div class="flex flex-wrap justify-center gap-8 md:gap-16" style="position:relative;z-index:1">
        <div class="text-center md:text-left">
          <div class="flex items-center gap-1 mb-1">
            <svg class="w-3 h-3 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Gross Assets</p>
          </div>
          <p id="gross-assets" class="text-xl font-bold text-emerald-600">—</p>
        </div>
        <div class="text-center md:text-left">
          <div class="flex items-center gap-1 mb-1">
            <svg class="w-3 h-3 text-rose-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></svg>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Debt</p>
          </div>
          <p id="gross-liabilities" class="text-xl font-bold text-rose-600">—</p>
        </div>
      </div>
    </div>

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-slate-800">Financial Records</h2>
      <button onclick="openAdd()" class="no-print px-5 py-2.5 bg-blue-600 text-white font-bold rounded-xl flex items-center gap-2 hover:bg-blue-700 shadow-lg">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Entry
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-emerald-50 px-6 py-4 border-b border-emerald-100 flex justify-between items-center font-bold text-sm text-emerald-800 uppercase tracking-wide">
          Assets <span id="assets-badge" class="bg-emerald-600 text-white px-2 py-0.5 rounded text-xs"></span>
        </div>
        <div id="assets-list" class="divide-y divide-slate-100"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-rose-50 px-6 py-4 border-b border-rose-100 flex justify-between items-center font-bold text-sm text-rose-800 uppercase tracking-wide">
          Liabilities <span id="liabilities-badge" class="bg-rose-600 text-white px-2 py-0.5 rounded text-xs"></span>
        </div>
        <div id="liabilities-list" class="divide-y divide-slate-100"></div>
      </div>
    </div>
  </div>

  <!-- ANALYSIS TAB (hidden initially) -->
  <div id="tab-dashboard" style="display:none" class="space-y-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <div class="flex items-center justify-between mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest">Liquid Capital
          <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1 0-4h14v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
        </div>
        <div id="kpi-liquid" class="text-2xl font-bold text-slate-900">—</div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <div class="flex items-center justify-between mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest">Portfolio Yield
          <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
        </div>
        <div id="kpi-yield" class="text-2xl font-bold text-blue-700">—</div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <div class="flex items-center justify-between mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest">Annual Rent
          <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/></svg>
        </div>
        <div id="kpi-rent" class="text-2xl font-bold text-emerald-600">—</div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <div class="flex items-center justify-between mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest">Est. Runway
          <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="10" y1="2" x2="14" y2="2"/><path d="M12 14l3-3"/><circle cx="12" cy="14" r="8"/></svg>
        </div>
        <div id="kpi-runway" class="text-2xl font-bold text-emerald-700">—</div>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-6">
        <div>
          <h2 class="text-lg font-bold flex items-center gap-2">
            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="10" y1="2" x2="14" y2="2"/><path d="M12 14l3-3"/><circle cx="12" cy="14" r="8"/></svg>
            Survival Forecast
          </h2>
          <p id="forecast-desc" class="text-sm text-slate-400 mt-1"></p>
        </div>
        <div class="flex flex-col sm:flex-row gap-8 no-print">
          <div class="flex flex-col gap-2" style="min-width:200px">
            <label class="text-xs font-bold text-slate-500 uppercase">Lifestyle Burn (Annual)</label>
            <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl overflow-hidden shadow-sm">
              <div id="expense-display" class="flex-1 px-4 py-3 font-bold text-blue-600"></div>
              <div class="flex flex-col border-l border-slate-200">
                <button type="button" onclick="shiftExpense(1000)" class="p-2 hover:bg-slate-100 text-slate-400 border-b border-slate-200">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
                </button>
                <button type="button" onclick="shiftExpense(-1000)" class="p-2 hover:bg-slate-100 text-slate-400">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="flex flex-col gap-2" style="min-width:150px">
            <div class="flex justify-between items-center">
              <label class="text-xs font-bold text-slate-500 uppercase">Inflation</label>
              <span id="inflation-label" class="text-xs font-bold text-emerald-600"></span>
            </div>
            <input id="inflation-slider" type="range" min="0" max="15" step="0.5"
              oninput="setInflation(parseFloat(this.value))"
              class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
          </div>
        </div>
      </div>
      <div style="height:320px;position:relative">
        <canvas id="runway-chart"></canvas>
      </div>
    </div>
  </div>

</div><!-- /max-w -->

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:1rem">
  <div onclick="closeModal()" style="position:absolute;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px)"></div>
  <form id="modal-form" onsubmit="handleSave(event)" style="position:relative;background:white;border-radius:1.5rem;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);width:100%;max-width:28rem;padding:2rem;overflow-y:auto;max-height:90vh">
    <div class="flex justify-between items-center mb-6">
      <h2 id="modal-title" class="text-xl font-bold"></h2>
      <button type="button" onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full">
        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer" class="flex gap-3 mt-6"></div>
  </form>
</div>

<script>
/* ── State ─────────────────────────────────────────────────────────────── */
var state = {
  items: [
    { id:'1', name:'Investment Portfolio', value:850000, type:'asset',     category:'Investments',    returnRate:8, rentalIncome:0,     monthlyPayment:0    },
    { id:'2', name:'Primary Residence',    value:600000, type:'asset',     category:'Property',       returnRate:3, rentalIncome:0,     monthlyPayment:0    },
    { id:'3', name:'Rental Condo',         value:350000, type:'asset',     category:'Rental Property',returnRate:4, rentalIncome:18000, monthlyPayment:0    },
    { id:'4', name:'Mortgage',             value:550000, type:'liability', category:'Debt',           returnRate:0, rentalIncome:0,     monthlyPayment:2800 }
  ],
  annualExpense: 60000,
  inflation: 3,
  activeTab: 'assets',
  editingId: null
};

var runwayChart = null;

/* ── Helpers ────────────────────────────────────────────────────────────── */
function fmt(v) {
  return new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', maximumFractionDigits:0 }).format(v);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function el(id) { return document.getElementById(id); }

/* ── Storage ────────────────────────────────────────────────────────────── */
function save() {
  try {
    localStorage.setItem('wealthtrack-v1', JSON.stringify({
      items: state.items,
      annualExpense: state.annualExpense,
      inflation: state.inflation
    }));
  } catch(e) {}
}

function loadSaved() {
  try {
    var raw = localStorage.getItem('wealthtrack-v1');
    if (!raw) return;
    var d = JSON.parse(raw);
    if (d.items) state.items = d.items;
    if (d.annualExpense) state.annualExpense = d.annualExpense;
    if (typeof d.inflation === 'number') state.inflation = d.inflation;
  } catch(e) {}
}

/* ── Computed values ────────────────────────────────────────────────────── */
function computeTotals() {
  var assets = state.items.filter(function(i) { return i.type === 'asset'; });
  var liabs  = state.items.filter(function(i) { return i.type === 'liability'; });

  var totalA = assets.reduce(function(s,i) { return s + Number(i.value); }, 0);
  var totalL = liabs.reduce(function(s,i)  { return s + Number(i.value); }, 0);

  var totalRental = assets
    .filter(function(i) { return i.category === 'Rental Property'; })
    .reduce(function(s,i) { return s + Number(i.rentalIncome || 0); }, 0);

  var totalDebt = liabs.reduce(function(s,i) { return s + Number(i.monthlyPayment || 0) * 12; }, 0);

  var investable = assets.filter(function(i) {
    return i.category !== 'Property' && i.category !== 'Rental Property';
  });
  var investableVal = investable.reduce(function(s,i) { return s + Number(i.value); }, 0);
  var weightedRet   = investable.reduce(function(s,i) {
    return s + Number(i.value) * (Number(i.returnRate || 0) / 100);
  }, 0);
  var avgReturn = investableVal > 0 ? (weightedRet / investableVal) * 100 : 0;

  return {
    assets: totalA,
    liabilities: totalL,
    netWorth: totalA - totalL,
    liquidNetWorth: investableVal,
    avgReturn: avgReturn,
    totalRental: totalRental,
    totalDebt: totalDebt
  };
}

function computeRunway(totals) {
  var out = [];
  var cap      = totals.liquidNetWorth;
  var lifestyle = state.annualExpense;
  var debt     = totals.totalDebt;
  var rental   = totals.totalRental;
  var ret      = totals.avgReturn / 100;

  for (var yr = 0; yr <= 40; yr++) {
    out.push({ year: 'Yr ' + yr, capital: Math.max(0, cap) });
    cap       = cap * (1 + ret) + rental - (lifestyle + debt);
    lifestyle = lifestyle * (1 + state.inflation / 100);
    rental    = rental * 1.02;
    if (cap <= 0 && yr > 0) break;
  }
  return out;
}

/* ── Render ─────────────────────────────────────────────────────────────── */
function renderAll() {
  var t = computeTotals();

  el('net-worth').textContent        = fmt(t.netWorth);
  el('gross-assets').textContent     = fmt(t.assets);
  el('gross-liabilities').textContent = fmt(t.liabilities);
  el('assets-badge').textContent     = fmt(t.assets);
  el('liabilities-badge').textContent = fmt(t.liabilities);

  renderItemList('assets-list',      state.items.filter(function(i) { return i.type === 'asset'; }),     'asset');
  renderItemList('liabilities-list', state.items.filter(function(i) { return i.type === 'liability'; }), 'liability');

  el('kpi-liquid').textContent  = fmt(t.liquidNetWorth);
  el('kpi-yield').textContent   = t.avgReturn.toFixed(1) + '%';
  el('kpi-rent').textContent    = fmt(t.totalRental);

  var runway = computeRunway(t);
  var solventYears = runway.filter(function(d) { return d.capital > 0; }).length - 1;
  el('kpi-runway').textContent  = (solventYears >= 40 ? '40+' : solventYears) + ' Yrs';

  el('forecast-desc').textContent =
    'Projection assumes ' + state.inflation + '% annual inflation and current lifestyle spend of ' + fmt(state.annualExpense) + '.';
  el('expense-display').textContent = fmt(state.annualExpense);
  el('inflation-label').textContent = state.inflation + '%';
  el('inflation-slider').value = state.inflation;

  renderChart(runway);
}

function buildingIcon() {
  return '<svg style="display:inline;width:12px;height:12px;margin-right:2px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>';
}

function cardIcon() {
  return '<svg style="display:inline;width:12px;height:12px;margin-right:2px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>';
}

function renderItemList(containerId, items, type) {
  var c = el(containerId);
  if (!items.length) {
    c.innerHTML = '<div style="padding:2rem;text-align:center;color:#94a3b8;font-size:0.875rem;font-style:italic">No ' + type + 's added yet</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var sub  = '';
    if (type === 'asset') {
      if (Number(item.rentalIncome) > 0) {
        sub = buildingIcon() + esc(item.category) + ' &bull; ' + fmt(item.rentalIncome) + ' Rent';
      } else if (item.category === 'Property') {
        sub = buildingIcon() + 'Property &bull; Primary Residence';
      } else {
        sub = esc(item.category) + ' &bull; ' + (item.returnRate || 0) + '% yield';
      }
    } else {
      sub = cardIcon() + esc(item.category) + (Number(item.monthlyPayment) > 0 ? ' &bull; ' + fmt(item.monthlyPayment) + '/mo' : '');
    }

    var valHtml = type === 'asset'
      ? '<span style="font-weight:700;font-size:0.875rem;color:#059669">' + fmt(item.value) + '</span>'
      : '<span style="font-weight:700;font-size:0.875rem;color:#e11d48">(' + fmt(item.value) + ')</span>';

    var chevron = '<svg style="width:16px;height:16px;color:#cbd5e1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';

    html += '<div onclick="openEdit(\'' + esc(item.id) + '\')" style="padding:1rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'
      + '<div>'
      + '<div style="font-size:0.875rem;font-weight:700;color:#1e293b">' + esc(item.name) + '</div>'
      + '<div style="font-size:0.65rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px">' + sub + '</div>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:0.75rem">' + valHtml + chevron + '</div>'
      + '</div>';
  }
  c.innerHTML = html;
}

function renderChart(runway) {
  var canvas = el('runway-chart');
  if (!canvas) return;
  var labels = runway.map(function(d) { return d.year; });
  var values = runway.map(function(d) { return d.capital; });

  if (runwayChart) {
    runwayChart.data.labels = labels;
    runwayChart.data.datasets[0].data = values;
    runwayChart.update('none');
    return;
  }
  runwayChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Deployable Capital',
        data: values,
        backgroundColor: '#3b82f6',
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: function(ctx) { return fmt(ctx.raw); } },
          backgroundColor: 'white',
          titleColor: '#1e293b',
          bodyColor: '#3b82f6',
          borderColor: '#e2e8f0',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 12
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: '#94a3b8', font: { size: 11 } }
        },
        y: {
          grid: { color: '#f1f5f9' },
          ticks: {
            color: '#94a3b8',
            font: { size: 11 },
            callback: function(v) { return '$' + (v / 1000) + 'k'; }
          }
        }
      }
    }
  });
}

/* ── Tab switching ──────────────────────────────────────────────────────── */
function switchTab(tab) {
  state.activeTab = tab;
  el('tab-assets').style.display    = tab === 'assets'    ? '' : 'none';
  el('tab-dashboard').style.display = tab === 'dashboard' ? '' : 'none';

  var activeClass   = 'px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white shadow-md';
  var inactiveClass = 'px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100';
  el('btn-assets').className    = tab === 'assets'    ? activeClass : inactiveClass;
  el('btn-dashboard').className = tab === 'dashboard' ? activeClass : inactiveClass;

  if (tab === 'dashboard') { renderAll(); }
}

/* ── Controls ───────────────────────────────────────────────────────────── */
function shiftExpense(delta) {
  state.annualExpense = Math.max(0, state.annualExpense + delta);
  save();
  renderAll();
}

function setInflation(val) {
  state.inflation = val;
  save();
  renderAll();
}

/* ── Modal ──────────────────────────────────────────────────────────────── */
function openAdd() {
  state.editingId = null;
  showModal(null);
}

function openEdit(id) {
  state.editingId = id;
  var item = null;
  for (var i = 0; i < state.items.length; i++) {
    if (state.items[i].id === id) { item = state.items[i]; break; }
  }
  showModal(item);
}

function closeModal() {
  el('modal').style.display = 'none';
  state.editingId = null;
}

function showModal(item) {
  var isEdit   = !!item;
  var type     = item ? item.type     : 'asset';
  var category = item ? item.category : 'Cash';
  var name     = item ? item.name     : '';
  var value    = item ? item.value    : '';
  var rate     = item ? (item.returnRate    || 0) : 0;
  var payment  = item ? (item.monthlyPayment|| 0) : 0;
  var rental   = item ? (item.rentalIncome  || 0) : 0;

  el('modal-title').textContent = isEdit ? 'Edit Record' : 'New Record';

  var secondaryField = type === 'asset'
    ? '<label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Growth (%)</label>'
      + '<input type="number" id="f-rate" step="0.1" value="' + esc(rate) + '" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none mt-1" />'
    : '<label class="text-xs font-bold text-rose-600 uppercase tracking-wider">Monthly Payment</label>'
      + '<input type="number" id="f-payment" placeholder="0" value="' + esc(payment) + '" class="w-full p-4 bg-rose-50 border border-rose-100 rounded-2xl outline-none text-rose-700 font-bold mt-1" />';

  var rentalField = category === 'Rental Property'
    ? '<div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100 mt-4">'
      + '<label class="text-xs font-bold text-emerald-700 uppercase tracking-wider">Net Annual Rental Income ($)</label>'
      + '<input type="number" id="f-rental" value="' + esc(rental) + '" class="w-full p-3 bg-white border border-emerald-200 rounded-xl font-bold text-emerald-700 outline-none mt-1" />'
      + '</div>'
    : '';

  var cats = ['Cash','Investments','Rental Property','Property','Debt'];
  var catOptions = cats.map(function(c) {
    return '<option value="' + c + '"' + (c === category ? ' selected' : '') + '>' + (c === 'Property' ? 'Primary Residence' : c) + '</option>';
  }).join('');

  el('modal-body').innerHTML =
    '<div class="space-y-1">'
    + '<label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Description</label>'
    + '<input type="text" id="f-name" required placeholder="e.g. Portfolio or Mortgage" value="' + esc(name) + '" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none" />'
    + '</div>'
    + '<div class="grid grid-cols-2 gap-4 mt-4">'
    + '<div><label class="text-xs font-bold text-slate-500 uppercase tracking-wider">' + (type === 'asset' ? 'Current Value ($)' : 'Remaining Balance ($)') + '</label>'
    + '<input type="number" id="f-value" required value="' + esc(value) + '" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none mt-1" /></div>'
    + '<div id="secondary-wrap">' + secondaryField + '</div>'
    + '</div>'
    + '<div class="grid grid-cols-2 gap-4 mt-4">'
    + '<div><label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Category</label>'
    + '<select id="f-category" onchange="onCategoryChange()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none mt-1">' + catOptions + '</select></div>'
    + '<div><label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Type</label>'
    + '<select id="f-type" onchange="onTypeChange()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold mt-1">'
    + '<option value="asset"' + (type==='asset' ? ' selected' : '') + '>Asset (+)</option>'
    + '<option value="liability"' + (type==='liability' ? ' selected' : '') + '>Liability (-)</option>'
    + '</select></div>'
    + '</div>'
    + '<div id="rental-wrap">' + rentalField + '</div>';

  var deleteBtn = isEdit
    ? '<button type="button" onclick="handleDelete()" style="flex:1" class="py-4 border border-rose-200 text-rose-500 font-bold rounded-2xl hover:bg-rose-50 flex items-center justify-center gap-2">'
      + '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>'
      + ' Delete</button>'
    : '';

  el('modal-footer').innerHTML = deleteBtn
    + '<button type="submit" style="flex:2" class="py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 shadow-xl">'
    + (isEdit ? 'Update Entry' : 'Add to Ledger') + '</button>';

  el('modal').style.display = 'flex';
}

function onTypeChange() {
  var type = el('f-type').value;
  el('secondary-wrap').innerHTML = type === 'asset'
    ? '<label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Growth (%)</label>'
      + '<input type="number" id="f-rate" step="0.1" value="0" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none mt-1" />'
    : '<label class="text-xs font-bold text-rose-600 uppercase tracking-wider">Monthly Payment</label>'
      + '<input type="number" id="f-payment" placeholder="0" value="0" class="w-full p-4 bg-rose-50 border border-rose-100 rounded-2xl outline-none text-rose-700 font-bold mt-1" />';
}

function onCategoryChange() {
  var cat = el('f-category').value;
  el('rental-wrap').innerHTML = cat === 'Rental Property'
    ? '<div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100 mt-4">'
      + '<label class="text-xs font-bold text-emerald-700 uppercase tracking-wider">Net Annual Rental Income ($)</label>'
      + '<input type="number" id="f-rental" value="0" class="w-full p-3 bg-white border border-emerald-200 rounded-xl font-bold text-emerald-700 outline-none mt-1" />'
      + '</div>'
    : '';
}

function handleSave(e) {
  e.preventDefault();
  var nameEl   = el('f-name');
  var valueEl  = el('f-value');
  var typeEl   = el('f-type');
  var catEl    = el('f-category');
  var rateEl   = el('f-rate');
  var payEl    = el('f-payment');
  var rentEl   = el('f-rental');

  var name  = nameEl  ? nameEl.value.trim()         : '';
  var value = valueEl ? parseFloat(valueEl.value)   : NaN;
  if (!name || isNaN(value)) return;

  var type     = typeEl  ? typeEl.value  : 'asset';
  var category = catEl   ? catEl.value   : 'Cash';
  var rate     = rateEl  ? parseFloat(rateEl.value  || 0) : 0;
  var payment  = payEl   ? parseFloat(payEl.value   || 0) : 0;
  var rental   = rentEl  ? parseFloat(rentEl.value  || 0) : 0;

  var item = {
    name:           name,
    value:          value,
    type:           type,
    category:       category,
    returnRate:     rate,
    monthlyPayment: type === 'liability'          ? payment : 0,
    rentalIncome:   category === 'Rental Property' ? rental  : 0
  };

  if (state.editingId) {
    for (var i = 0; i < state.items.length; i++) {
      if (state.items[i].id === state.editingId) {
        item.id = state.editingId;
        state.items[i] = item;
        break;
      }
    }
  } else {
    item.id = String(Date.now());
    state.items.push(item);
  }

  save();
  closeModal();
  renderAll();
}

function handleDelete() {
  if (!state.editingId) return;
  var id = state.editingId;
  state.items = state.items.filter(function(i) { return i.id !== id; });
  save();
  closeModal();
  renderAll();
}

/* ── Init ───────────────────────────────────────────────────────────────── */
el('hdr-date').textContent = 'Financial Position Report • ' + new Date().toLocaleDateString();
loadSaved();
el('inflation-slider').value = state.inflation;
renderAll();
</script>
</body>
</html>
