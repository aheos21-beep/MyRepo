<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Line Chart Demo — AI Power Rankings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #08080f;
      --bg2:    #10101e;
      --card:   #14142a;
      --border: rgba(255,255,255,0.08);
      --text:   #e2e2f0;
      --muted:  #888ab0;
      --accent: #667eea;
      --header-h: 52px;
      --footer-h: 34px;
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Header ── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(8,8,15,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto; height: 100%;
      padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 1.5rem; filter: drop-shadow(0 0 10px #667eea88); }
    .logo h1 {
      font-size: 1.1rem; font-weight: 800;
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tagline { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
    .demo-badge {
      font-size: 0.7rem; font-weight: 700; padding: 4px 10px;
      background: rgba(102,126,234,0.15); border: 1px solid rgba(102,126,234,0.3);
      border-radius: 99px; color: var(--accent);
    }

    /* ── Layout ── */
    main {
      position: fixed;
      top: var(--header-h); bottom: var(--footer-h);
      left: 0; right: 0;
      display: flex; max-width: 1400px; margin: 0 auto;
      padding: 14px 16px 10px; gap: 14px;
    }

    /* ── Left rankings column (1/3) ── */
    .col-left {
      flex: 0 0 33.333%;
      display: flex; flex-direction: column; min-height: 0; gap: 8px;
    }
    .col-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; flex-shrink: 0; }

    .rank-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px;
      display: flex; flex-direction: column; gap: 7px;
      flex: 1; min-height: 0;
    }
    .rank-card.rank-1 { border-color: rgba(255,215,0,0.28); }
    .rank-card.rank-2 { border-color: rgba(192,192,192,0.22); }
    .rank-card.rank-3 { border-color: rgba(205,127,50,0.22); }

    .card-top { display: flex; align-items: center; justify-content: space-between; }
    .card-identity { display: flex; align-items: center; gap: 8px; }
    .tool-icon {
      font-size: 1.2rem; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg2); border-radius: 7px; border: 1px solid var(--border);
    }
    .tool-name { font-size: 0.82rem; font-weight: 700; }
    .tool-version { font-size: 0.67rem; font-weight: 500; color: var(--accent); }
    .tool-company { font-size: 0.63rem; color: var(--muted); }
    .rank-badge { font-size: 1.2rem; font-weight: 900; }
    .rank-badge.gold   { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    .rank-badge.silver { color: #C0C0C0; }
    .rank-badge.bronze { color: #CD7F32; }
    .rank-badge.plain  { color: var(--muted); font-size: 0.95rem; }

    .score-row { display: flex; justify-content: space-between; align-items: baseline; }
    .score-label { font-size: 0.65rem; color: var(--muted); }
    .score-value {
      font-size: 1rem; font-weight: 800;
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .score-bar-track { height: 3px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #667eea, #f093fb); }
    .metrics-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .metric-chip {
      font-size: 0.63rem; padding: 2px 6px; border-radius: 99px;
      border: 1px solid var(--border); color: var(--muted); background: var(--bg2);
    }
    .metric-chip .val { color: var(--text); font-weight: 600; }

    /* ── Right chart column (2/3) ── */
    .col-right {
      flex: 1; display: flex; flex-direction: column; min-height: 0;
    }
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; gap: 14px;
    }
    .chart-header { flex-shrink: 0; }
    .chart-header h3 { font-size: 0.95rem; font-weight: 700; }
    .chart-header p { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .chart-wrap { flex: 1; min-height: 0; position: relative; }

    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      flex-shrink: 0;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
    .legend-line {
      width: 20px; height: 3px; border-radius: 99px; flex-shrink: 0;
    }

    /* ── Footer ── */
    .site-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      display: flex; align-items: center; justify-content: center;
      border-top: 1px solid var(--border);
      background: rgba(8,8,15,0.92);
      font-size: 0.7rem; color: var(--muted);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <div>
          <h1>AI Power Rankings</h1>
          <p class="tagline">Refreshed at 6am &amp; 6pm UTC via GitHub Actions</p>
        </div>
      </div>
      <span class="demo-badge">Preview</span>
    </div>
  </header>

  <main>

    <!-- Left: Rankings (1/3) -->
    <div class="col-left">
      <div class="col-title">🏆 Top 5 AI Tools</div>
      <!-- cards injected by JS -->
    </div>

    <!-- Right: Line Chart (2/3) -->
    <div class="col-right">
      <div class="chart-card">
        <div class="chart-header">
          <h3>📈 Score History — Past 12 Months</h3>
          <p>Monthly capability-weighted scores · updated each month</p>
        </div>
        <div class="chart-wrap">
          <canvas id="lineChart"></canvas>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    <p>AI Power Rankings · auto-refreshed at 6am &amp; 6pm UTC (2am &amp; 2pm EDT)</p>
  </footer>

  <script>
    const TOOLS = [
      { name:'Claude',         version:'Claude 4',       company:'Anthropic',        icon:'✨', color:'#cc785c', scores:[73,75,76,78,79,80,82,83,84,85,86,87], rank:1, badge:'🥇', badgeClass:'gold',   cap:97, growth:38, users:60  },
      { name:'Perplexity AI',  version:'Perplexity Pro', company:'Perplexity AI Inc',icon:'🔍', color:'#20c997', scores:[60,63,65,67,70,72,74,76,77,79,81,82], rank:2, badge:'🥈', badgeClass:'silver', cap:88, growth:48, users:15  },
      { name:'Gemini',         version:'Gemini Ultra 2', company:'Google DeepMind',  icon:'💎', color:'#4285f4', scores:[74,75,76,77,77,78,78,79,79,80,81,80], rank:3, badge:'🥉', badgeClass:'bronze', cap:92, growth:26, users:150 },
      { name:'ChatGPT',        version:'GPT-5',          company:'OpenAI',           icon:'🤖', color:'#10a37f', scores:[78,78,77,77,76,76,76,75,76,76,76,76], rank:4, badge:'#4',  badgeClass:'plain',  cap:95, growth:15, users:180 },
      { name:'GitHub Copilot', version:'Copilot Pro+',   company:'Microsoft/GitHub', icon:'🚀', color:'#6e5494', scores:[65,66,67,67,68,68,69,70,70,71,72,72], rank:5, badge:'#5',  badgeClass:'plain',  cap:90, growth:22, users:50  },
    ];

    const MONTHS = ['Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May'];

    // ── Render ranking cards ──────────────────────────────
    const col = document.querySelector('.col-left');
    TOOLS.forEach(t => {
      const barPct = Math.min((t.scores[11] / 100) * 100, 100).toFixed(1);
      const card = document.createElement('div');
      card.className = `rank-card rank-${t.rank}`;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-identity">
            <div class="tool-icon">${t.icon}</div>
            <div>
              <div class="tool-name">${t.name} <span class="tool-version">(${t.version})</span></div>
              <div class="tool-company">${t.company}</div>
            </div>
          </div>
          <div class="rank-badge ${t.badgeClass}">${t.badge}</div>
        </div>
        <div>
          <div class="score-row">
            <span class="score-label">Score</span>
            <span class="score-value">${t.scores[11]}</span>
          </div>
          <div class="score-bar-track" style="margin-top:5px">
            <div class="score-bar-fill" style="width:${barPct}%"></div>
          </div>
        </div>
        <div class="metrics-row">
          <span class="metric-chip">🧠 <span class="val">${t.cap}</span></span>
          <span class="metric-chip">📈 <span class="val">+${t.growth}%</span></span>
          <span class="metric-chip">👥 <span class="val">${t.users}M</span>/mo</span>
        </div>
      `;
      col.appendChild(card);
    });

    // ── Render legend ──────────────────────────────────────
    const legendEl = document.getElementById('chartLegend');
    TOOLS.forEach(t => {
      legendEl.innerHTML += `
        <div class="legend-item">
          <div class="legend-line" style="background:${t.color}"></div>
          ${t.name}
        </div>`;
    });

    // ── Render chart ───────────────────────────────────────
    const ctx = document.getElementById('lineChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: MONTHS,
        datasets: TOOLS.map(t => ({
          label: t.name,
          data: t.scores,
          borderColor: t.color,
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointBackgroundColor: t.color,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.35,
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#14142a',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
            titleColor: '#e2e2f0',
            bodyColor: '#888ab0',
            padding: 12,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}`
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#888ab0', font: { size: 11, family: 'Inter' } },
            border: { color: 'rgba(255,255,255,0.08)' }
          },
          y: {
            min: 55,
            max: 100,
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#888ab0', font: { size: 11, family: 'Inter' } },
            border: { color: 'rgba(255,255,255,0.08)' }
          }
        }
      }
    });
  </script>
</body>
</html>
