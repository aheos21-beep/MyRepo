name: Update stock screener data
on:
  schedule:
    - cron: "30 22 * * 1-5"   # after TSX close, weekdays
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance
      - run: python Stock-Screener/fetch_data.py
      - name: Commit data
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add Stock-Screener/data.json
          git diff --staged --quiet || git commit -m "Stock data refresh $(date -u +%F)"
          git push
