name: Bi-Monthly AI Ranking Refresh

on:
  schedule:
    - cron: '0 9 1,15 * *'   # 9am UTC on the 1st and 15th of each month
  workflow_dispatch:           # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate rankings and history
        run: python AI-Tools-Ranking/generate_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI-Tools-Ranking/rankings.json AI-Tools-Ranking/history.json
          git diff --staged --quiet || git commit -m "chore: refresh $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
