name: Daily AI Ranking Refresh

on:
  schedule:
    - cron: '0 6 * * *'    # 6am UTC
    - cron: '0 18 * * *'   # 6pm UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Generate rankings and news
        run: python scripts/generate_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI-Tools-Ranking/rankings.json AI-Tools-Ranking/news.json
          git diff --staged --quiet || git commit -m "chore: refresh $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
