<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tools Ranking &amp; News</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <div>
          <h1>AI Power Rankings</h1>
          <p class="tagline">Refreshed daily via GitHub Actions</p>
        </div>
      </div>
      <div class="header-meta">
        <span id="last-updated" class="last-updated">Loading…</span>
        <span class="next-refresh">Next: <strong id="countdown">—</strong></span>
      </div>
    </div>
  </header>

  <main>
    <div class="two-col-layout">

      <div class="col-left">
        <div class="col-title">🏆 Top 6 AI Tools</div>
        <div id="rankings-grid" class="rankings-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

      <div class="col-right">
        <div class="col-title">📰 Latest AI News</div>
        <div id="news-grid" class="news-grid">
          <div class="skeleton-card news-skeleton"></div>
          <div class="skeleton-card news-skeleton"></div>
          <div class="skeleton-card news-skeleton"></div>
          <div class="skeleton-card news-skeleton"></div>
          <div class="skeleton-card news-skeleton"></div>
        </div>
        <div id="news-empty" class="news-empty hidden">
          <span>📡</span><p>No articles yet.</p>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <p>AI Power Rankings · auto-refreshed daily at midnight UTC</p>
  </footer>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
